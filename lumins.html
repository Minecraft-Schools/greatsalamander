<div id="games"></div>

<script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
<script>
  Lumin.init({
    container: '#games',
    theme: 'dark'
  });
  
  function goFullscreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
      elem.requestFullscreen().catch(e => {});
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
      elem.msRequestFullscreen();
    }
  }
  
  // Mouse movement - WILL NOT WORK for fullscreen
  document.addEventListener('mousemove', goFullscreen, { once: true });
  
  // These WILL work (user gestures)
  document.addEventListener('click', goFullscreen, { once: true });
  document.addEventListener('keydown', goFullscreen, { once: true });
  document.addEventListener('touchstart', goFullscreen, { once: true });
  document.addEventListener('pointerdown', goFullscreen, { once: true });
  
  // Try anyway on load (will fail)
  goFullscreen();
  setTimeout(goFullscreen, 1);
</script>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  
  div {
    width: 100%;
    left: 0;
    position: fixed;
    height: 100%;
    top: 0;
    border-radius: 0px;
  }
</style>
